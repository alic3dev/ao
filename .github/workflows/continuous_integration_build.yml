name: continuous_integration_build
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["*"]
env:
  target_device_version_macos: 15.5
jobs:
  continuous_integration_build:
    runs-on: macos-latest
    steps:
      - name: git_initialization
        run: git config --global init.defaultBranch core
      - name: checkout_ao
        uses: actions/checkout@v5
        with:
          repository: alic3dev/ao
          path: ao
      - name: checkout_cer0
        uses: actions/checkout@v5
        with:
          repository: alic3dev/cer0
          path: cer0
      - name: checkout_cexil
        uses: actions/checkout@v5
        with:
          repository: alic3dev/cexil
          path: cexil
      - name: checkout_clic3
        uses: actions/checkout@v5
        with:
          repository: alic3dev/clic3
          path: clic3
      - name: make_clic3
        run: cd clic3 && make target_device_version=${{ env.target_device_version_macos }}
      - name: make_cer0
        run: cd cer0 && make target_device_version=${{ env.target_device_version_macos }}
      - name: make_cexil
        run: cd cexil && make target_device_version=${{ env.target_device_version_macos }}
      - name: make_ao
        run: cd ao && make target_device_version=${{ env.target_device_version_macos }}
