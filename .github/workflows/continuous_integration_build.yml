name: continuous_integration_build
on:
  push:
    branches: ["core"]
  pull_request:
    branches: ["*"]
jobs:
  continuous_integration_build:
    runs-on: macos-latest
    steps:
      - name: checkout_ao
        uses: actions/checkout@v4
        with:
          path: ao
      - name: checkout_cer0
        uses: actions/checkout@v4
        with:
          repository: alic3dev/cer0
          path: cer0
      - name: checkout_cexil
        uses: actions/checkout@v4
        with:
          repository: alic3dev/cexil
          path: cexil
      - name: checkout_clic3
        uses: actions/checkout@v4
        with:
          repository: alic3dev/clic3
          path: clic3
      - name: make_clic3
        run: cd clic3 && make
      - name: make_cer0
        run: cd cer0 && make
      - name: make_cexil
        run: cd cexil && make
      - name: make_ao
        run: cd ao && make
